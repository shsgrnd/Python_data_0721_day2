<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>일일 매출 리포트</title>
  <style>
    :root { color-scheme: light; font-family: Arial, "Noto Sans KR", sans-serif; }
    body { max-width: 960px; margin: 0 auto; padding: 40px 24px; color: #243247; background: #f5f7fb; }
    header { margin-bottom: 28px; }
    h1 { margin-bottom: 8px; }
    .generated-at { color: #667085; }
    .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 24px 0; }
    .card, table { background: #fff; border: 1px solid #e3e8ef; border-radius: 10px; box-shadow: 0 3px 12px rgba(36, 50, 71, .06); }
    .card { padding: 20px; }
    .card span { display: block; color: #667085; margin-bottom: 10px; }
    .card strong { font-size: 1.6rem; color: #1f5fbf; }
    table { width: 100%; border-collapse: collapse; overflow: hidden; }
    th, td { padding: 14px 18px; text-align: left; border-bottom: 1px solid #e3e8ef; }
    th { color: #fff; background: #315f94; }
    td:last-child, th:last-child { text-align: right; }
    tr:last-child td { border-bottom: 0; }
    @media (max-width: 640px) { .kpis { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>일일 매출 리포트</h1>
    <div class="generated-at">생성 시각: 2026-07-21 20:34:20</div>
  </header>

  <section class="kpis" aria-label="핵심 지표">
    <div class="card"><span>총매출</span><strong>4,086,433,016원</strong></div>
    <div class="card"><span>주문수</span><strong>5,000건</strong></div>
    <div class="card"><span>평균 주문액</span><strong>817,287원</strong></div>
  </section>

  <section>
    <h2>카테고리별 매출</h2>
    <table>
      <thead><tr><th>카테고리</th><th>매출액</th></tr></thead>
      <tbody>
      
        <tr><td>Food</td><td>838,638,725원</td></tr>
      
        <tr><td>Beauty</td><td>825,460,617원</td></tr>
      
        <tr><td>Fashion</td><td>812,645,716원</td></tr>
      
        <tr><td>Home</td><td>805,919,833원</td></tr>
      
        <tr><td>Electronics</td><td>803,768,125원</td></tr>
      
      </tbody>
    </table>
  </section>
</body>
</html>
